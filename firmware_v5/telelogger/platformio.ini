; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board=esp-wrover-kit
board_build.f_cpu = 160000000L
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = partitions_ota.csv
# Enable WiFi co-operation with cellular, use HTTPS POST for HA webhook
# SERVER_HOST left undefined so NVS provisioning (config_nvs.bin) can set it
# at runtime via loadConfig().  SERVER_PORT defaults to 443 for HTTPS when
# not supplied by NVS.
build_flags =
    -DENABLE_WIFI=1
    -DSERVER_PROTOCOL=3
    -DENABLE_HTTPD=1
    -DSTORAGE=2
; Enable the flag below ONLY on Freematics ONE+ Model B hardware fitted with
; the ESP32-WROVER module (4 MB external PSRAM).  When enabled the firmware
; uses much larger data buffers (1024 slots × 384 B ≈ 384 KB in PSRAM instead
; of 32 × 256 B = 8 KB in internal DRAM).  The boot log will confirm PSRAM is
; present by printing "RAM:XXX KB PSRAM:4MB".
; WARNING: do NOT enable on standard Freematics ONE+ (ESP32-D0WDQ6, no PSRAM).
; heap_caps_malloc(MALLOC_CAP_SPIRAM) returns NULL when PSRAM is absent and the
; firmware will crash immediately with an assert(total > 0) failure.
;     -DBOARD_HAS_PSRAM=1

