; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board=esp-wrover-kit
board_build.f_cpu = 160000000L
framework = arduino
monitor_speed = 115200
board_build.flash_mode = qio
board_build.partitions = huge_app.csv
# Enable WiFi co-operation with cellular, use HTTPS POST for HA webhook
# SERVER_HOST left undefined so NVS provisioning (config_nvs.bin) can set it
# at runtime via loadConfig().  SERVER_PORT defaults to 443 for HTTPS when
# not supplied by NVS.
build_flags =
    -DENABLE_WIFI=1
    -DSERVER_PROTOCOL=3
    -DENABLE_HTTPD=1

;[env:esp32c3]
;platform = espressif32
;framework = arduino
;board = esp32-c3-devkitm-1
;board_build.mcu = esp32c3
;monitor_speed=115200
;board_build.partitions = huge_app.csv

[platformio]
src_dir=.

[env]
lib_extra_dirs=../../libraries
