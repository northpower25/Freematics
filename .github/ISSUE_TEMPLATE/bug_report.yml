name: "🐛 Bug Report"
description: Report a bug or unexpected behavior in the Freematics ONE+ Home Assistant Integration
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ## Thank you for taking the time to report a bug!

        Please fill in as much detail as possible to help reproduce and fix the issue.
        Before submitting, check:
        - 📖 [Documentation](https://github.com/northpower25/Freematics/blob/master/docs/README.md)
        - ❓ [FAQ & HowTo](https://github.com/northpower25/Freematics/blob/master/docs/README.md#faq--howto)
        - 🔍 [Existing issues](https://github.com/northpower25/Freematics/issues)

  - type: checkboxes
    id: not_duplicate
    attributes:
      label: "Duplicate check"
      options:
        - label: "I have read the documentation and FAQ and my issue is not covered there"
          required: true
        - label: "I have searched existing issues and this is not a duplicate"
          required: true

  - type: textarea
    id: description
    attributes:
      label: "Bug Description"
      description: "A clear and concise description of what the bug is."
      placeholder: "When I do X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: "Steps to Reproduce"
      description: "Step-by-step instructions to reproduce the bug."
      placeholder: |
        1. Go to '...'
        2. Press '...'
        3. Observe '...'
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: "Expected Behavior"
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: "Actual Behavior"
      description: "What actually happened? Include any error messages."
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: "Integration Version"
      description: "Version of the Freematics ONE+ integration (Settings → Integrations → Freematics ONE+ or in `manifest.json`)"
      placeholder: "e.g. 0.0.96"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: "Home Assistant Version"
      description: "Your Home Assistant version (Settings → About)"
      placeholder: "e.g. 2025.3.0"
    validations:
      required: true

  - type: dropdown
    id: ha_installation_type
    attributes:
      label: "Home Assistant Installation Type"
      options:
        - "Home Assistant OS (HAOS)"
        - "Home Assistant Container (Docker)"
        - "Home Assistant Supervised"
        - "Home Assistant Core"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: device_model
    attributes:
      label: "Freematics ONE+ Model"
      options:
        - "Model A (WiFi + BT, no cellular)"
        - "Model B (WiFi + BT + 4G)"
        - "Model H (WiFi + BT + 4G)"
        - "Unknown / Other"
    validations:
      required: true

  - type: dropdown
    id: connection_type
    attributes:
      label: "Connection Type"
      description: "How is the device connecting to the internet?"
      options:
        - "WiFi only"
        - "Cellular / SIM only"
        - "WiFi + Cellular fallback"
        - "Not applicable"
    validations:
      required: false

  - type: checkboxes
    id: affected_features
    attributes:
      label: "Affected Feature(s)"
      description: "Which feature(s) are affected? (Select all that apply)"
      options:
        - label: "Integration setup / config flow"
        - label: "WiFi OTA flashing"
        - label: "Browser Serial (Web Serial API) flashing"
        - label: "Serial USB via HA Server flashing"
        - label: "Manual flash / esptool"
        - label: "Sensor data / telemetry"
        - label: "Webhook connectivity"
        - label: "Send Config to Device"
        - label: "Lovelace dashboard / card"
        - label: "LED / buzzer control"
        - label: "Cellular / SIM connectivity"
        - label: "Other"

  - type: textarea
    id: logs
    attributes:
      label: "Home Assistant Logs"
      description: |
        Paste relevant log entries here. Enable debug logging for the integration in `configuration.yaml`:
        ```yaml
        logger:
          logs:
            custom_components.freematics: debug
        ```
        Then reproduce the issue and copy the relevant lines from **Settings → System → Logs**.
      render: text
    validations:
      required: false

  - type: textarea
    id: serial_output
    attributes:
      label: "Device Serial Output (if applicable)"
      description: |
        If the issue involves firmware or connectivity, paste the device's serial monitor output here.
        Connect via USB and open a serial monitor at **115200 baud** (e.g. Arduino IDE, PuTTY).
      render: text
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional Context"
      description: "Screenshots, configuration snippets, or any other information that might help."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: "Final Checklist"
      options:
        - label: "I have provided the integration version and Home Assistant version"
          required: true
        - label: "I have included relevant log output or error messages"
          required: false
