# Freematics ONE+ Dashboard
# Import this file into Home Assistant via:
#   Settings → Dashboards → Add Dashboard → YAML mode
# Or paste the card configurations into an existing dashboard.
#
# Replace WEBHOOK_ID_SHORT with the first 8 characters of your webhook ID
# (found in Settings → Integrations → Freematics ONE+).
# Example: if webhook_id = "a1b2c3d4e5f60718", use "a1b2c3d4"
#
# Route tracking: The map card on the "GPS & Route" tab uses hours_to_show to
# display the driven route for the past 8 hours. This requires the Home Assistant
# Recorder integration to be active (enabled by default).

title: Freematics ONE+
views:
  # ═══════════════════════════════════════════════════════════════════════════
  # Tab 1 – Vehicle overview
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Fahrzeug
    icon: mdi:car
    path: freematics
    cards:
      # ── Main vehicle telemetry card ─────────────────────────────────────────
      - type: custom:freematics-vehicle-card
        title: Mein Fahrzeug
        # Set entity_prefix to the base entity ID of your sensors.
        # Pattern: sensor.freematics_one_<webhook_id_short>
        # Example: entity_prefix: sensor.freematics_one_a1b2c3d4
        entity_prefix: sensor.freematics_one_WEBHOOK_ID_SHORT

      # ── Speed & RPM gauges ──────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_speed
            name: Geschwindigkeit
            min: 0
            max: 200
            needle: true
            severity:
              green: 0
              yellow: 80
              red: 130
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_rpm
            name: Drehzahl
            min: 0
            max: 7000
            needle: true
            severity:
              green: 0
              yellow: 5000
              red: 6500

      # ── Engine load & throttle gauges ────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_engine_load
            name: Motorlast
            min: 0
            max: 100
            needle: false
            severity:
              green: 0
              yellow: 70
              red: 90
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_throttle
            name: Drosselklappe
            min: 0
            max: 100
            needle: false
            severity:
              green: 0
              yellow: 70
              red: 90

      # ── Temperature gauges ───────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_coolant_temp
            name: Kühlmitteltemperatur
            min: 0
            max: 130
            needle: true
            severity:
              green: 60
              yellow: 95
              red: 110
          - type: gauge
            entity: sensor.freematics_one_WEBHOOK_ID_SHORT_intake_temp
            name: Ansaugtemperatur
            min: -20
            max: 80
            needle: true
            severity:
              green: -20
              yellow: 50
              red: 70

      # ── Battery voltage gauge ────────────────────────────────────────────────
      - type: gauge
        entity: sensor.freematics_one_WEBHOOK_ID_SHORT_battery
        name: Batteriespannung
        min: 10
        max: 16
        needle: true
        severity:
          green: 12.4
          yellow: 11.5
          red: 10

      # ── Speed & RPM history graph ────────────────────────────────────────────
      - type: history-graph
        title: Geschwindigkeit & Drehzahl – Verlauf (2 h)
        hours_to_show: 2
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_speed
            name: Geschwindigkeit (km/h)
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_rpm
            name: Drehzahl (rpm)

      # ── Temperature history graph ────────────────────────────────────────────
      - type: history-graph
        title: Temperaturen – Verlauf (2 h)
        hours_to_show: 2
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_coolant_temp
            name: Kühlmittel (°C)
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_intake_temp
            name: Ansaugluft (°C)
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_device_temp
            name: Gerät (°C)

      # ── OBD-II detail data ───────────────────────────────────────────────────
      - type: entities
        title: OBD-II Detaildaten
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_fuel_pressure
            name: Kraftstoffdruck
            icon: mdi:gauge
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_timing_advance
            name: Zündzeitpunkt
            icon: mdi:clock-fast
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_short_fuel_trim_1
            name: Kurzzeit-Kraftstofftrimm B1
            icon: mdi:tune
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_long_fuel_trim_1
            name: Langzeit-Kraftstofftrimm B1
            icon: mdi:tune-vertical
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_short_fuel_trim_2
            name: Kurzzeit-Kraftstofftrimm B2
            icon: mdi:tune
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_long_fuel_trim_2
            name: Langzeit-Kraftstofftrimm B2
            icon: mdi:tune-vertical

      # ── Device status (signal, temp) ─────────────────────────────────────────
      - type: glance
        title: Gerätestatus
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_battery
            name: Batterie
            icon: mdi:battery
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_signal
            name: Signal
            icon: mdi:signal
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_device_temp
            name: Gerätetemp.
            icon: mdi:thermometer-chip

      # ── Accelerometer ────────────────────────────────────────────────────────
      - type: glance
        title: Beschleunigungssensor
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_x
            name: Achse X
            icon: mdi:axis-x-arrow
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_y
            name: Achse Y
            icon: mdi:axis-y-arrow
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_z
            name: Achse Z
            icon: mdi:axis-z-arrow

      # ── FWCAM reference ──────────────────────────────────────────────────────
      - type: markdown
        title: "🚗 Fahrtenbuch, Tankbuch & Treibstoffpreise"
        content: |
          Für ein vollständiges **Fahrtenbuch**, **Tankbuch** sowie aktuelle
          **Treibstoffpreise** und eine **Tankstellensuche** (aktuell nur Deutschland)
          empfehlen wir die Zusatzintegration:

          ### [HA Fuel Watcher & Car Advanced Manager (FWCAM)](https://github.com/northpower25/HA-Fuel-Watcher-Car-Advanced-Manager-FWCAM)

          ✅ Vollständiges Fahrtenbuch mit Start-/Endpunkt und Distanz
          ✅ Tankbuch mit Verbrauchsauswertung
          ✅ Aktuelle Treibstoffpreise (Deutschland)
          ✅ Tankstellensuche in der Nähe

  # ═══════════════════════════════════════════════════════════════════════════
  # Tab 2 – GPS & Route
  # ═══════════════════════════════════════════════════════════════════════════
  - title: GPS & Route
    icon: mdi:map-marker-path
    path: freematics-gps
    cards:
      # ── Live map with route history ──────────────────────────────────────────
      # The device_tracker entity is used so HA displays a proper location pin.
      # hours_to_show renders the driven route of the last 8 hours on the map
      # (requires the Recorder integration, enabled by default).
      - type: map
        title: Fahrzeugposition & Fahrtroute (8 h)
        entities:
          - entity: device_tracker.freematics_one_WEBHOOK_ID_SHORT_standort
            color: "#2196f3"
        hours_to_show: 8
        aspect_ratio: "16:9"

      # ── GPS status glance ────────────────────────────────────────────────────
      - type: glance
        title: GPS-Status
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_lat
            name: Breitengrad
            icon: mdi:latitude
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_lng
            name: Längengrad
            icon: mdi:longitude
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_alt
            name: Höhe (m)
            icon: mdi:altimeter
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_heading
            name: Kurs (°)
            icon: mdi:compass
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_satellites
            name: Satelliten
            icon: mdi:satellite-variant
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_hdop
            name: HDOP
            icon: mdi:crosshairs-gps

      # ── GPS speed vs OBD speed history graph ─────────────────────────────────
      - type: history-graph
        title: Geschwindigkeit – GPS vs. OBD (2 h)
        hours_to_show: 2
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_gps_speed
            name: GPS-Geschwindigkeit (km/h)
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_speed
            name: OBD-Geschwindigkeit (km/h)

      # ── GPS altitude history ─────────────────────────────────────────────────
      - type: history-graph
        title: Höhenprofil – Verlauf (2 h)
        hours_to_show: 2
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_alt
            name: Höhe (m)

      # ── Route tracking info ──────────────────────────────────────────────────
      - type: markdown
        title: "🗺️ Routenverfolgung"
        content: |
          Die Karte zeigt die **Fahrtroute der letzten 8 Stunden** automatisch an,
          sofern die Home Assistant **Recorder**-Integration aktiv ist (Standard).

          **Tipp:** Über die Verlaufsansicht (History) in Home Assistant lässt sich
          die zurückgelegte Strecke für beliebige Zeiträume nachvollziehen –
          einfach die Entität `device_tracker.freematics_one_WEBHOOK_ID_SHORT_standort`
          in der Verlaufssuche eingeben.

          Für eine lückenlose Fahrtaufzeichnung mit Fahrtenbuch empfehlen wir:
          **[FWCAM – Fuel Watcher & Car Advanced Manager](https://github.com/northpower25/HA-Fuel-Watcher-Car-Advanced-Manager-FWCAM)**

  # ═══════════════════════════════════════════════════════════════════════════
  # Tab 3 – Device Management / Flash
  # ═══════════════════════════════════════════════════════════════════════════
  - title: Geräteverwaltung
    icon: mdi:cog
    path: freematics-management
    cards:
      - type: entities
        title: Freematics ONE+ – Geräteaktionen
        entities:
          - entity: button.freematics_one_flash_firmware_via_wifi_ota
            name: Firmware via WiFi OTA flashen
            icon: mdi:wifi-arrow-up-down
          - entity: button.freematics_one_flash_firmware_via_serial
            name: Firmware via Serial USB flashen
            icon: mdi:usb-flash-drive
          - entity: button.freematics_one_send_config_to_device
            name: Konfiguration senden
            icon: mdi:cog-transfer
          - entity: button.freematics_one_restart_device
            name: Gerät neu starten
            icon: mdi:restart

      - type: markdown
        title: Kurzanleitung – Firmware-Setup
        content: |
          ## Firmware-Konfiguration

          Nach dem Flashen folgende Einstellungen vornehmen:

          | Einstellung | Wert |
          |---|---|
          | SERVER_PROTOCOL | 4 (PROTOCOL_HA_WEBHOOK) |
          | SERVER_HOST | HA-Hostname |
          | SERVER_PORT | 443 |
          | HA_WEBHOOK_ID | Integrationen → Freematics ONE+ |

          ## Via WiFi OTA flashen (AP-Modus)
          1. Freematics ONE+ einschalten (Werksgerät oder frisch geflashtes Gerät)
          2. Mit dem WLAN-Netzwerk **TELELOGGER** verbinden (Passwort: **PASSWORD**)
          3. Die **Geräte-IP** `192.168.4.1` in den Integrationseinstellungen eintragen
          4. **Firmware via WiFi OTA flashen** drücken

          ## Via Serial USB flashen
          1. Freematics ONE+ über USB mit dem HA-Host verbinden
          2. **Seriellen Port** in den Integrationseinstellungen einstellen (z. B. `/dev/ttyUSB0`)
          3. **Firmware via Serial USB flashen** drücken

          ## Konfiguration an laufendes Gerät senden
          1. Sicherstellen, dass das Gerät mit aktiviertem HTTPD läuft
          2. Aktuelle Geräte-IP in den Integrationseinstellungen eintragen
          3. **Konfiguration senden** drücken

          Weitere Informationen: [Dokumentation](https://github.com/northpower25/Freematics/blob/master/docs/README.md).
