# Freematics ONE+ Dashboard
# Import this file into Home Assistant via:
#   Settings → Dashboards → Add Dashboard → YAML mode
# Or paste the card configurations into an existing dashboard.
#
# Replace WEBHOOK_ID_SHORT with the first 8 characters of your webhook ID
# (found in Settings → Integrations → Freematics ONE+).
# Example: if webhook_id = "a1b2c3d4e5f60718", use "a1b2c3d4"

title: Freematics ONE+
views:
  - title: Vehicle
    icon: mdi:car
    path: freematics
    cards:
      # ── Main vehicle telemetry card ─────────────────────────────────────
      - type: custom:freematics-vehicle-card
        title: My Car
        # Set entity_prefix to the base entity ID of your sensors.
        # Pattern: sensor.freematics_one_<webhook_id_short>
        # Example: entity_prefix: sensor.freematics_one_a1b2c3d4
        entity_prefix: sensor.freematics_one_WEBHOOK_ID_SHORT

      # ── Location map ────────────────────────────────────────────────────
      - type: map
        title: Vehicle Location
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_lat
        aspect_ratio: "16:9"

      # ── Live data grid ──────────────────────────────────────────────────
      - type: entities
        title: OBD-II Data
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_speed
            name: Speed
            icon: mdi:speedometer
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_rpm
            name: RPM
            icon: mdi:engine
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_throttle
            name: Throttle
            icon: mdi:gas-station
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_engine_load
            name: Engine Load
            icon: mdi:gauge
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_coolant_temp
            name: Coolant Temperature
            icon: mdi:thermometer
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_intake_temp
            name: Intake Temperature
            icon: mdi:thermometer-lines
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_fuel_pressure
            name: Fuel Pressure
            icon: mdi:gauge
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_timing_advance
            name: Timing Advance
            icon: mdi:clock-fast

      # ── GPS data ─────────────────────────────────────────────────────────
      - type: entities
        title: GPS Data
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_lat
            name: Latitude
            icon: mdi:latitude
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_lng
            name: Longitude
            icon: mdi:longitude
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_alt
            name: Altitude
            icon: mdi:altimeter
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_gps_speed
            name: GPS Speed
            icon: mdi:speedometer-medium
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_heading
            name: Heading
            icon: mdi:compass
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_satellites
            name: Satellites
            icon: mdi:satellite-variant
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_hdop
            name: HDOP
            icon: mdi:crosshairs-gps

      # ── Device status ─────────────────────────────────────────────────────
      - type: entities
        title: Device Status
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_battery
            name: Battery Voltage
            icon: mdi:battery
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_signal
            name: Signal Strength
            icon: mdi:signal
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_device_temp
            name: Device Temperature
            icon: mdi:thermometer-chip

      # ── Accelerometer ─────────────────────────────────────────────────────
      - type: entities
        title: Accelerometer
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_x
            name: Accelerometer X
            icon: mdi:axis-x-arrow
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_y
            name: Accelerometer Y
            icon: mdi:axis-y-arrow
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_acc_z
            name: Accelerometer Z
            icon: mdi:axis-z-arrow

      # ── History graph ─────────────────────────────────────────────────────
      - type: history-graph
        title: Speed & RPM History
        hours_to_show: 1
        entities:
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_speed
            name: Speed
          - entity: sensor.freematics_one_WEBHOOK_ID_SHORT_rpm
            name: RPM

  # ── Management / Flash tab ────────────────────────────────────────────────
  - title: Device Management
    icon: mdi:cog
    path: freematics-management
    cards:
      - type: entities
        title: Freematics ONE+ – Device Actions
        entities:
          - entity: button.freematics_one_flash_firmware_via_wifi_ota
            name: Flash Firmware via WiFi OTA
            icon: mdi:wifi-arrow-up-down
          - entity: button.freematics_one_flash_firmware_via_serial
            name: Flash Firmware via Serial USB
            icon: mdi:usb-flash-drive
          - entity: button.freematics_one_send_config_to_device
            name: Send Config to Device
            icon: mdi:cog-transfer
          - entity: button.freematics_one_restart_device
            name: Restart Device
            icon: mdi:restart

      - type: markdown
        title: Quick Reference – Firmware Setup
        content: |
          ## Firmware Configuration

          After flashing, configure the firmware with these settings:

          | Setting | Value |
          |---|---|
          | SERVER_PROTOCOL | 4 (PROTOCOL_HA_WEBHOOK) |
          | SERVER_HOST | Your HA host |
          | SERVER_PORT | 443 |
          | HA_WEBHOOK_ID | See Integrations → Freematics ONE+ |

          ## Flash via WiFi OTA (AP Mode)
          1. Power on the Freematics ONE+ (factory or freshly flashed device)
          2. Connect your phone/laptop to WiFi network **TELELOGGER** (password: **PASSWORD**)
          3. Enter `192.168.4.1` as the **Device IP** in the integration settings
          4. Press **Flash Firmware via WiFi OTA**

          ## Flash via Serial USB
          1. Connect Freematics ONE+ to the HA host via USB
          2. Set the **Serial port** in integration settings (e.g. `/dev/ttyUSB0`)
          3. Press **Flash Firmware via Serial USB**

          ## Send Config to Running Device
          1. Ensure the device is running firmware with HTTPD enabled
          2. Enter the device's current IP in integration settings
          3. Press **Send Config to Device**

          For detailed instructions see the [documentation](https://github.com/northpower25/Freematics/blob/master/docs/README.md).
